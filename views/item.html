<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itens</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-image: url('assets/telaMenu.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      color: #fff;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .container {
      background-color: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      margin: 80px auto;
      max-width: 960px;
      backdrop-filter: blur(10px);
    }
    .btn-voltar {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: #1b4acc;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-weight: 600;
    }
    .btn-voltar:hover { background-color: #163ca3; }
    .form-section {
      margin-bottom: 20px;
    }
    .form-section .form-control, .form-section .form-select {
      border-radius: 10px;
    }
    .table {
      background-color: rgba(255,255,255,0.05);
      color: #fff;
    }
    .table thead {
      color: #306bff;
    }
    .pagination { justify-content: center; }
    .btn-clean {
      background-color: #dc3545;
      color: #fff;
      border-radius: 10px;
      margin-left: 10px;
    }
    .btn-clean:hover { background-color: #c82333; }
  </style>
</head>
<body>
  <button class="btn btn-voltar" onclick="voltar()">Voltar</button>
  <div class="container">
    <h2 class="text-white mb-3">Gerenciar Itens</h2>
    <div class="form-section">
      <div class="row g-2">
        <div class="col-md-4">
          <input type="hidden" id="inputIdItem">
          <label class="form-label text-white">Nome do Item</label>
          <input type="text" id="inputNome" class="form-control" placeholder="Nome" required>
        </div>
        <div class="col-md-2">
          <label class="form-label text-white">Tamanho</label>
          <select id="inputTamanho" class="form-select" required>
            <option value="1">P</option>
            <option value="2">M</option>
            <option value="3">G</option>
            <option value="4">GG</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label text-white">Código Rastreio</label>
          <input type="text" id="inputCodigo" class="form-control" placeholder="Código" required>
        </div>
        <div class="col-md-2">
          <label class="form-label text-white">Quantidade</label>
          <input type="number" id="inputQuantidade" class="form-control" min="0" required>
        </div>
        <div class="col-md-3">
          <label class="form-label text-white">Prateleira</label>
          <select id="inputPrateleira" class="form-select" required>
            <option value="">Carregando prateleiras...</option>
          </select>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-success" onclick="salvarItem()">Salvar</button>
        <button class="btn btn-clean" onclick="limparCampos()">Limpar</button>
      </div>
    </div>

    <div class="mb-3">
      <input type="text" id="filtroItem" class="form-control" placeholder="Filtrar por nome" oninput="filtrarTabelaItens()">
    </div>

    <table class="table table-hover table-bordered rounded">
      <thead>
        <tr>
          <th>Nome</th><th>Tamanho</th><th>Código</th><th>Qtd</th><th>Prateleira</th><th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbodyItens"></tbody>
    </table>

    <nav>
      <ul class="pagination" id="pagination"></ul>
    </nav>
  </div>

  <script>
    // Mapeamento de tamanhos para exibição
    const tamanhosMap = {
      1: 'P',
      2: 'M',
      3: 'G',
      4: 'GG'
    };

    let itens = [], prateleiras = [], paginaAtual = 1, porPagina = 10;

    function voltar() { window.location.href = 'menu.html'; }

    function limparCampos() {
      document.getElementById('inputIdItem').value = '';
      document.getElementById('inputNome').value = '';
      document.getElementById('inputTamanho').value = '1';
      document.getElementById('inputCodigo').value = '';
      document.getElementById('inputQuantidade').value = '';
      document.getElementById('inputPrateleira').value = '';
    }

    async function carregarPrateleiras() {
      try {
        const resp = await fetch('/prateleiras');
        const data = await resp.json();
        if (data.status && data.prateleiras) {
          prateleiras = data.prateleiras;
          const select = document.getElementById('inputPrateleira');
          select.innerHTML = '';
          
          // Ordena as prateleiras por descrição
          prateleiras.sort((a, b) => a.strDescricao.localeCompare(b.strDescricao));
          
          prateleiras.forEach(p => {
            const option = document.createElement('option');
            option.value = p.idTblPrateleiras;
            option.textContent = `${p.strDescricao} (Q: ${p.intQuadra}, L: ${p.intLote})`;
            select.appendChild(option);
          });
        } else {
          console.error('Erro ao carregar prateleiras:', data.msg);
        }
      } catch(e) {
        console.error('Erro ao carregar prateleiras:', e);
      }
    }

    async function carregarItens() {
      try {
        const resp = await fetch('/itens');
        const data = await resp.json();
        if (data.status) {
          itens = data.itens;
          paginaAtual = 1;
          renderTabela();
          renderPagination();
        } else alert(data.msg);
      } catch(e) { console.error(e); alert('Erro conexão'); }
    }

    function renderTabela() {
      const tbody = document.getElementById('tbodyItens');
      tbody.innerHTML = '';
      const inicio = (paginaAtual -1)*porPagina;
      const subset = itens.slice(inicio, inicio + porPagina);
      subset.forEach(i => {
        const tr = document.createElement('tr');
        
        // Encontra a prateleira correspondente
        const prateleira = prateleiras.find(p => p.idTblPrateleiras === i.TblPrateleiras_idTblPrateleiras);
        const prateleiraText = prateleira 
          ? `${prateleira.strDescricao} (Q: ${prateleira.intQuadra}, L: ${prateleira.intLote})`
          : i.TblPrateleiras_idTblPrateleiras;

        tr.innerHTML = `
          <td>${i.strNome}</td>
          <td>${tamanhosMap[i.intTamanho] || i.intTamanho}</td>
          <td>${i.strCodigoRastreio}</td>
          <td>${i.intQuantidade}</td>
          <td>${prateleiraText}</td>
          <td>
            <button class="btn btn-sm btn-warning" onclick="editarItem(${i.idTblItens})">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="excluirItem(${i.idTblItens})">Excluir</button>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    function renderPagination() {
      const totalPaginas = Math.ceil(itens.length / porPagina);
      const ul = document.getElementById('pagination');
      ul.innerHTML = '';
      for (let i = 1; i <= totalPaginas; i++) {
        const li = document.createElement('li');
        li.className = 'page-item' + (i === paginaAtual ? ' active' : '');
        li.innerHTML = `<a class="page-link" href="javascript:changePage(${i})">${i}</a>`;
        ul.appendChild(li);
      }
    }

    function changePage(n) {
      paginaAtual = n;
      renderTabela();
      renderPagination();
    }

    function filtrarTabelaItens() {
      const filtro = document.getElementById('filtroItem').value.toLowerCase();
      itens = itens.filter(i => i.strNome.toLowerCase().includes(filtro));
      paginaAtual = 1;
      renderTabela();
      renderPagination();
    }

    async function salvarItem() {
      const id = document.getElementById('inputIdItem').value;
      const obj = {
        item: {
          strNome: document.getElementById('inputNome').value,
          intTamanho: Number(document.getElementById('inputTamanho').value),
          strCodigoRastreio: document.getElementById('inputCodigo').value,
          intQuantidade: Number(document.getElementById('inputQuantidade').value),
          prateleira: { idTblPrateleiras: Number(document.getElementById('inputPrateleira').value) }
        }
      };

      try {
        const url = id ? `/itens/${id}` : '/itens';
        const method = id ? 'PUT' : 'POST';
        const resp = await fetch(url, {
          method, headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify(obj)
        });
        const data = await resp.json();
        if (data.status) {
          limparCampos(); 
          await carregarItens();
        } else alert(data.msg);
      } catch(e) {
        console.error(e);
        alert('Erro ao salvar');
      }
    }

    async function editarItem(id) {
      try {
        const resp = await fetch(`/itens/${id}`);
        const data = await resp.json();
        if (data.status && data.item) {
          const i = data.item;
          document.getElementById('inputIdItem').value = id;
          document.getElementById('inputNome').value = i.strNome;
          document.getElementById('inputTamanho').value = i.intTamanho;
          document.getElementById('inputCodigo').value = i.strCodigoRastreio;
          document.getElementById('inputQuantidade').value = i.intQuantidade;
          document.getElementById('inputPrateleira').value = i.TblPrateleiras_idTblPrateleiras;
        } else {
          alert(data.msg);
        }
      } catch (e) {
        console.error(e);
        alert('Erro ao carregar item');
      }
    }

    async function excluirItem(id) {
      if (!confirm('Excluir este item?')) return;
      try {
        const resp = await fetch(`/itens/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await resp.json();
        if (data.status) carregarItens();
        else alert(data.msg);
      } catch(e) {
        console.error(e);
        alert('Erro ao excluir');
      }
    }

    // Carrega os dados quando a página é carregada
    document.addEventListener('DOMContentLoaded', async () => {
      await carregarPrateleiras();
      await carregarItens();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
