<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tipos de Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      background-image: url('assets/telaMenu.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Rubik', sans-serif;
    }

    h1, h2, .card-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      color: #2c3e50;
    }

    .form-container, .table-container {
      margin: 30px auto;
      background-color: transparent;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .table thead {
      background-color: #f5f5f5;
    }

    .table th {
      font-weight: 500;
    }

    .actions-column {
      width: 120px;
      text-align: center;
    }

    .btn-primary {
      background-color: #306bff;
      border-color: #306bff;
      font-weight: 500;
    }

    .btn-primary:hover {
      background-color: #1b4acc;
      border-color: #1b4acc;
    }

    .btn-success {
      background-color: #28a745;
      border-color: #28a745;
      font-weight: 500;
    }

    .btn-success:hover {
      background-color: #218838;
      border-color: #218838;
    }

    .btn-danger {
      background-color: #dc3545;
      border-color: #dc3545;
      font-weight: 500;
    }

    .btn-danger:hover {
      background-color: #c82333;
      border-color: #c82333;
    }

    .modal-content {
      border-radius: 12px;
    }

    .modal-header {
      background-color: #306bff;
      color: white;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .modal-footer .btn {
      min-width: 100px;
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">
      <!-- Cabeçalho com botão Voltar -->
      <div class="row mb-4">
        <div class="col-md-12 position-relative text-center">
            <h1 class="mb-3">Tipos de Usuário</h1>
            <button class="btn btn-outline-secondary position-absolute top-0 end-0" onclick="voltarParaMenu()">
                <i class="fas fa-arrow-left"></i> Voltar ao Menu
            </button>
        </div>
      </div>

      <!-- Lista -->
      <div class="row">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h5 class="mb-0">Lista de Tipos de Usuário</h5>
              <button class="btn btn-success" onclick="abrirModalNovoTipoUsuario()">
                <i class="fas fa-plus"></i> Novo Tipo
              </button>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-striped table-hover">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Descrição</th>
                      <th>Ações</th>
                    </tr>
                  </thead>
                  <tbody id="tabelaTiposUsuario"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modais -->
  <div class="modal fade" id="modalTipoUsuario" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTipoUsuarioLabel">Novo Tipo de Usuário</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="formTipoUsuario">
            <input type="hidden" id="idTipoUsuario">
            <div class="mb-3">
              <label for="nomeTipoUsuario" class="form-label">Descrição do Tipo</label>
              <input type="text" class="form-control" id="nomeTipoUsuario" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" onclick="salvarTipoUsuario()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalConfirmacao" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirmar Exclusão</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          Tem certeza que deseja excluir este tipo de usuário?
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-danger" id="btnConfirmarExclusao">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let tipoUsuarioParaExcluir = null;

    document.addEventListener('DOMContentLoaded', () => {
      const token = getToken();
      if (!token) {
        alert("Sessão expirada. Faça login novamente.");
        window.location.href = "login.html";
        return;
      }
      carregarTiposUsuario();
    });

    function voltarParaMenu() {
      window.location.href = "menu.html";
    }

    function getToken() {
      return localStorage.getItem('token');
    }

    async function carregarTiposUsuario() {
      try {
        const response = await fetch('http://localhost:80/tipos-usuarios', {
          headers: {
            Authorization: `Bearer ${getToken()}`
          }
        });

        if (response.status === 401 || response.status === 403) {
          alert("Sessão inválida ou expirada. Faça login novamente.");
          window.location.href = "login.html";
          return;
        }

        const data = await response.json();
        if (data.status) {
          preencherTabelaTiposUsuario(data.tiposUsuarios);
        } else {
          alert('Erro: ' + data.msg);
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao carregar tipos de usuário');
      }
    }

    function preencherTabelaTiposUsuario(tiposUsuario) {
      const tabela = document.getElementById('tabelaTiposUsuario');
      tabela.innerHTML = '';
      if (tiposUsuario && tiposUsuario.length > 0) {
        tiposUsuario.forEach(tipo => {
          const linha = document.createElement('tr');
          linha.innerHTML = `
            <td>${tipo.idTblTipoUsuarios}</td>
            <td>${tipo.strDescricao}</td>
            <td>
              <button class="btn btn-primary btn-sm" onclick="editarTipoUsuario(${tipo.idTblTipoUsuarios})">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn btn-danger btn-sm" onclick="confirmarExclusao(${tipo.idTblTipoUsuarios})">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          `;
          tabela.appendChild(linha);
        });
      } else {
        tabela.innerHTML = '<tr><td colspan="3" class="text-center">Nenhum tipo de usuário encontrado</td></tr>';
      }
    }

    function abrirModalNovoTipoUsuario() {
      document.getElementById('modalTipoUsuarioLabel').textContent = 'Novo Tipo de Usuário';
      document.getElementById('idTipoUsuario').value = '';
      document.getElementById('nomeTipoUsuario').value = '';
      new bootstrap.Modal(document.getElementById('modalTipoUsuario')).show();
    }

    async function editarTipoUsuario(id) {
      try {
        const response = await fetch(`http://localhost:80/tipos-usuarios/${id}`, {
          headers: {
            Authorization: `Bearer ${getToken()}`
          }
        });

        if (response.status === 401 || response.status === 403) {
          alert("Sessão inválida ou expirada. Faça login novamente.");
          window.location.href = "login.html";
          return;
        }

        const data = await response.json();
        if (data.status && data.tipoUsuario) {
          const tipo = data.tipoUsuario[0];
          document.getElementById('modalTipoUsuarioLabel').textContent = 'Editar Tipo de Usuário';
          document.getElementById('idTipoUsuario').value = tipo.idTblTipoUsuarios;
          document.getElementById('nomeTipoUsuario').value = tipo.strDescricao;
          new bootstrap.Modal(document.getElementById('modalTipoUsuario')).show();
        } else {
          alert('Tipo de usuário não encontrado');
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao carregar tipo de usuário');
      }
    }

    async function salvarTipoUsuario() {
      const id = document.getElementById('idTipoUsuario').value;
      const descricao = document.getElementById('nomeTipoUsuario').value.trim();

      if (!descricao) {
        alert('Preencha a descrição');
        return;
      }

      const tipoUsuario = {
        tipoUsuario: {
          nomeTipoUsuario: descricao
        }
      };

      

      let url = 'http://localhost:80/tipos-usuarios';
      let method = 'POST';

      if (id) {
        url += `/${id}`;
        method = 'PUT';
      }

      try {
        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${getToken()}`
          },
          body: JSON.stringify(tipoUsuario)
        });

        if (response.status === 401 || response.status === 403) {
          alert("Sessão inválida ou expirada. Faça login novamente.");
          window.location.href = "login.html";
          return;
        }

        const data = await response.json();
        if (data.status) {
          alert(data.msg);
          const modal = bootstrap.Modal.getInstance(document.getElementById('modalTipoUsuario'));
          modal.hide();
          carregarTiposUsuario();
        } else {
          alert('Erro: ' + data.msg);
        }
      } catch (error) {
        console.error('Erro:', error);
        console.log('Enviando para backend:', corpoRequisicao);
        alert('Erro ao salvar tipo de usuário');
      }
    }

    function confirmarExclusao(id) {
      tipoUsuarioParaExcluir = id;
      new bootstrap.Modal(document.getElementById('modalConfirmacao')).show();
    }

    document.getElementById('btnConfirmarExclusao').addEventListener('click', async () => {
      if (!tipoUsuarioParaExcluir) return;

      try {
        const response = await fetch(`http://localhost:80/tipos-usuarios/${tipoUsuarioParaExcluir}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${getToken()}`
          }
        });

        if (response.status === 401 || response.status === 403) {
          alert("Sessão inválida ou expirada. Faça login novamente.");
          window.location.href = "login.html";
          return;
        }

        const data = await response.json();
        if (data.status) {
          alert(data.msg);
          carregarTiposUsuario();
          new bootstrap.Modal(document.getElementById('modalConfirmacao')).hide();
          tipoUsuarioParaExcluir = null;
        } else {
          alert('Erro: ' + data.msg);
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao excluir tipo de usuário');
      }
    });
  </script>
</body>
</html>
