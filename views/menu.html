<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu Principal - Sistema de Estoque</title>

  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/login';
    }
  </script>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f2f5fb;
      font-family: 'Rubik', sans-serif;
      margin: 0;
      padding: 0;
      background-image: url('assets/telaMenu.png'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    .header {
      background: linear-gradient(135deg, rgba(48, 107, 255, 0.7), rgba(27, 74, 204, 0.7));
      padding: 2rem 1rem;
      text-align: center;
      color: white;
      font-family: 'Poppins', sans-serif;
      border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 2;
    }

    .header h1 {
      font-size: 2.8rem;
      margin-bottom: 0;
    }

    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .menu-section {
      background-color: rgba(255, 255, 255, 0.97);
      margin-top: -40px;
      padding: 3rem 2rem;
      border-radius: 30px;
      max-width: 1300px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      position: relative;
      z-index: 2;
    }

    .card-hover {
      transition: all 0.3s ease;
      cursor: pointer;
      border: 2px solid #e3e9f7;
      border-radius: 18px;
      padding: 1.5rem 1rem;
      background: linear-gradient(145deg, #ffffff, #f2f6ff);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .card-hover:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
      border-color: #8faeff;
    }

    .card-hover i {
      font-size: 2.2rem;
      color: #3366ff;
      margin-bottom: 0.8rem;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: #2c3e50;
    }

    .icon-circle {
      background-color: #e8f0ff;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.8rem auto;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }

      .card-hover {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Menu</h1>
    <h1>Smart Stock </h1>
    <a href="/login" class="btn btn-outline-light logout-btn" onclick="localStorage.removeItem('token')">
      <i class="bi bi-box-arrow-right"></i> Sair
    </a>
  </div>

  <div class="menu-section">
    <div class="row g-4 justify-content-center">
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card card-hover text-center" onclick="location.href='/usuario'">
          <div class="icon-circle"><i class="bi bi-people-fill"></i></div>
          <div class="card-title">Usuários</div>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-3">
        <div class="card card-hover text-center" onclick="location.href='/prateleira'">
          <div class="icon-circle"><i class="bi bi-grid-3x3-gap-fill"></i></div>
          <div class="card-title">Prateleiras</div>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-3">
        <div class="card card-hover text-center" onclick="location.href='/item'">
          <div class="icon-circle"><i class="bi bi-box-seam"></i></div>
          <div class="card-title">Itens</div>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-3">
        <div class="card card-hover text-center" onclick="location.href='/tipos-usuario'">
          <div class="icon-circle"><i class="bi bi-person-badge-fill"></i></div>
          <div class="card-title">Tipos de Usuário</div>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-3">
        <div class="card card-hover text-center" onclick="location.href='/operacao'">
          <div class="icon-circle"><i class="bi bi-clock-history"></i></div>
          <div class="card-title">Operações</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
